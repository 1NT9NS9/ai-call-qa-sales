version: 1

execution:
  ordering: top_to_bottom_left_to_right
  stop_after_stage_completion: true
  auto_advance_stage: false
  state_file: .agents/execution-state.json

steps:
  - id: test
    agent: test-agent
  - id: code
    agent: code-agent
  - id: verify
    agent: verifier-agent
  - id: cleanup
    agent: code-agent
  - id: final-verify
    agent: verifier-agent

stages:
  - id: stage-0
    name: Setup
    file: docs/stages/stage-0-setup.md
    required_documents:
      - docs/PLAN.md
      - docs/ARCHITECTURE.md
      - docs/STRUCTURE.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional

  - id: stage-1
    name: Database
    file: docs/stages/stage-1-database.md
    required_documents:
      - docs/PLAN.md
      - docs/CONTRACTS.md
      - docs/ARCHITECTURE.md
      - docs/STRUCTURE.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional

  - id: stage-2
    name: Transcription
    file: docs/stages/stage-2-transcription.md
    required_documents:
      - docs/PLAN.md
      - docs/CONTRACTS.md
      - docs/INTEGRATIONS.md
      - docs/ARCHITECTURE.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional

  - id: stage-3
    name: RAG
    file: docs/stages/stage-3-rag.md
    required_documents:
      - docs/PLAN.md
      - docs/CONTRACTS.md
      - docs/INTEGRATIONS.md
      - docs/ARCHITECTURE.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional

  - id: stage-4
    name: Analysis
    file: docs/stages/stage-4-analysis.md
    required_documents:
      - docs/PLAN.md
      - docs/CONTRACTS.md
      - docs/INTEGRATIONS.md
      - docs/ARCHITECTURE.md
      - docs/SECURITY.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional

  - id: stage-5
    name: Export
    file: docs/stages/stage-5-export.md
    required_documents:
      - docs/PLAN.md
      - docs/CONTRACTS.md
      - docs/INTEGRATIONS.md
      - docs/ARCHITECTURE.md
      - docs/SECURITY.md
      - docs/SCALING.md
    steps:
      test: required
      code: required
      verify: required
      cleanup: optional
      final-verify: optional
