name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  app-api-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: app_db
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app_user -d app_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Stage 0 environment
        run: cp .env.example .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/app-api/requirements.txt
          pip install pytest

      - name: Wait for Postgres test service
        run: |
          python - <<'PY'
          import time
          import psycopg

          dsn = "postgresql://app_user:app_password@127.0.0.1:5432/app_db"
          last_error = None

          for _ in range(30):
              try:
                  with psycopg.connect(dsn, connect_timeout=3, autocommit=True) as conn:
                      with conn.cursor() as cur:
                          cur.execute("CREATE EXTENSION IF NOT EXISTS vector")
                  break
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          else:
              raise last_error or RuntimeError("Postgres test service did not become ready.")
          PY

      - name: Lint
        run: ruff check apps/app-api/src apps/app-api/tests

      - name: Type check
        run: mypy --python-version 3.12 --ignore-missing-imports apps/app-api/src

      - name: Compile source
        run: python -m compileall apps/app-api/src

      - name: Smoke import application factory
        working-directory: apps/app-api
        run: |
          python - <<'PY'
          from src.main import create_app
          app = create_app()
          try:
            assert app.title == "AI Call QA & Sales Coach API"
            print("Application factory smoke check passed.")
          finally:
            app.state.engine.dispose()
          PY

      - name: Run tests if present
        run: |
          if find apps/app-api/tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            python -m pytest apps/app-api/tests -q
          else
            echo "No test files found; skipping pytest."
          fi

      - name: Build Docker image
        run: docker build -f apps/app-api/Dockerfile -t hr-project-app-api .

      - name: Validate Compose config
        run: docker compose config

      - name: Run Stage 0 smoke check
        run: |
          set -euxo pipefail
          docker compose up --build -d

          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health | grep -qx '{"status":"ok"}'; then
              healthy=1
              break
            fi
            sleep 2
          done

          test "$healthy" -eq 1
          docker compose exec -T app-api sh -lc "test -d /app/storage/audio"
          docker compose exec -T db sh -lc "psql -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -tAc \"SELECT extname FROM pg_extension WHERE extname = 'vector'\" | grep -qx vector"

      - name: Dump Compose state on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
